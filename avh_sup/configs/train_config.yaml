data_info:
  name: "AV1M"  # Choose the dataset used: FAVC (FakeAVCeleb), AV1M (AV-Deepfake1M)
  root_path: "/egr/research-sprintai/baliahsa/projects/AVH-Align/Features/AV1M"  # Data root path 
  csv_root_path: "/egr/research-sprintai/baliahsa/projects/AVH-Align/avh_sup/csv_metadata/av1m"  # Path to the folder containing split csv's
  apply_l2: True  # Apply l2 normalization of input features (always used in our experiments)

model_hparams:
  model_type: "mlp"  # mlp or linear
  input_type: "both"  # both, video, audio (choose either to use both modalities or just one of them)

callbacks:
  logger:
    log_path: "outputs/logs"  # Path to the directory where the logs will be saved
    name: "csv"
  ckpt_args:
    ckpt_dir: "outputs/ckpts"  # Path to the directory where the checkpoints will be saved
    metric: "val_loss"
    mode: "min"
  early_stopping:
    metric: "val_loss"
    mode: "min"
    patience: 10

epochs: 100
seed: 43