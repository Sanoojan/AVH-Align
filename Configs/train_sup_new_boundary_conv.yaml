run:
  name: fully_sup_boundary_conv_av_only_with_full_eval

seed: 42

wandb:
  enabled: true
  project: AV_DF
  entity: null
  group: null
  tags:
    - supervised
    - boundary-refinement
    - hard-synth
    - av-only
  mode: online
  watch_model: true
  watch_log: gradients
  watch_log_freq: 100

training:
  device: cuda
  epochs: 200
  early_stopping_patience: 15
  use_tqdm: false

checkpoint:
  save_path: checkpoints/
  monitor: val/frame/ap

scheduler:
  mode: max
  factor: 0.5
  patience: 5

optimizer:
  name: AdamW
  learning_rate: 6.0e-5
  weight_decay: 0.0

loss:
  frame_pos_weight: 20.0
  boundary_pos_weight: 10.0
  boundary_target_radius: 2
  frame_bce_weight: 1.0
  coarse_frame_bce_weight: 0.3
  video_bce_weight: 0.1
  class_std_weight: 0.05
  boundary_bce_weight: 0.5
  boundary_offset_weight: 0.2

metrics:
  test_style_segment_metrics: true
  test_style_metrics_device: cuda
  frame_confidence_threshold: 0.85
  target_fprs:
    - 0.05
    - 0.10
  iou_thresholds:
    - 0.5
    - 0.75
    - 0.95

loader:
  batch_size: 24
  num_workers: 4
  pin_memory: true

data:
  data_root_path: Features/AV1M
  data_val_root_path: Features/AV1M-Trimmed
  metadata_root_path: av1m_metadata/
  train_split: train
  val_split: test
  train_metadata_file: train_metadata_supervised.csv
  val_metadata_file: test_metadata_supervised.csv
  T_train: 500
  debug: false
  synthesize_at_feature: false
  synthesize_prob: 0.5
  synthstyle: hard
  hard_min_start_deviation: 10
  hard_max_start_deviation: 30
  max_fake_segment_length: 10
  num_max_synth_segments_per_video: 3
  synth_modalities: random

model:
  name: ConvBoundaryTemporalFusionAV_only
  params:
    input_dim: 1024
    hidden_dim: 512
    num_layers: 4
    kernel_size: 5
    dropout: 0.1
