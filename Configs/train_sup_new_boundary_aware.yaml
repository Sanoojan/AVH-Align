run:
  name: boundary_aware_av_localizer_hard_synth_supervised

seed: 42

wandb:
  enabled: true
  project: AV_DF
  entity: null
  group: null
  tags:
    - supervised
    - boundary-aware-localization
    - avh-align
  mode: online
  watch_model: true
  watch_log: gradients
  watch_log_freq: 100

training:
  device: cuda
  epochs: 200
  early_stopping_patience: 15
  use_tqdm: false

checkpoint:
  save_path: checkpoints/
  monitor: val/frame/ap

scheduler:
  mode: max
  factor: 0.5
  patience: 5

optimizer:
  name: AdamW
  learning_rate: 6.0e-5
  weight_decay: 0.0

loss:
  lambda_start: 1.0
  lambda_end: 1.0
  lambda_dice: 1.0
  lambda_smooth: 0.03
  boundary_radius: 2
  focal_alpha: 0.75
  focal_gamma: 2.0
  frame_pos_weight: 20.0

metrics:
  test_style_segment_metrics: true
  test_style_metrics_device: cuda
  frame_confidence_threshold: 0.85
  save_validation_logits: true
  validation_logits_dir: null
  target_fprs:
    - 0.05
    - 0.10
  iou_thresholds:
    - 0.5
    - 0.75
    - 0.95

loader:
  batch_size: 24
  num_workers: 4
  pin_memory: true

data:
  data_root_path: Features/AV1M
  data_val_root_path: Features/AV1M-Trimmed
  metadata_root_path: av1m_metadata/
  train_split: train
  val_split: test
  train_metadata_file: train_metadata_with_hard_synth_fake_segments.csv
  val_metadata_file: test_metadata_supervised.csv
  T_train: 500
  debug: false
  synthesize_at_feature: false
  synthesize_prob: 0.5
  synthstyle: hard
  hard_min_start_deviation: 10
  hard_max_start_deviation: 30
  max_fake_segment_length: 10
  num_max_synth_segments_per_video: 3
  synth_modalities: random

model:
  name: BoundaryAwareAVLocalizer
  params:
    input_dim: 1024
    hidden_dim: 512
    num_layers: 6
    kernel_size: 5
    dropout: 0.1
